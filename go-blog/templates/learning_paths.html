<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>{{ .title }} - 技术学习社区</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/app.css" rel="stylesheet">
    <style>
        .path-card { background: var(--c-surface); border: 1px solid var(--c-border); border-left: 3px solid var(--c-indigo); border-radius: var(--radius); padding: 28px; transition: all 0.2s; }
        .path-card:hover { box-shadow: var(--shadow-md); border-left-color: var(--c-amber); }
        .path-card.diff-1 { border-left-color: var(--c-emerald); }
        .path-card.diff-2 { border-left-color: var(--c-amber); }
        .path-card.diff-3 { border-left-color: var(--c-rose); }
        .path-title { font-size: 20px; font-weight: 700; color: var(--c-text); margin-bottom: 10px; }
        .path-desc { color: var(--c-text-muted); line-height: 1.6; margin-bottom: 14px; }
        .path-meta { display: flex; gap: 10px; margin-bottom: 18px; }
        .path-meta span { padding: 4px 12px; background: var(--c-bg); border-radius: 14px; font-size: 12px; color: var(--c-text-muted); font-family: var(--font-mono); }
    </style>
</head>
<body>
<div class="container" style="max-width: 1140px; padding: 20px;">

<nav class="app-nav">
    <div class="nav-links">
        <a href="/">首页</a>
        <a href="/article/list">文章</a>
        <a href="/interview">面试题</a>
        <a href="/qa/list">问答</a>
        <a href="/learning-paths" class="active">学习</a>
        <a href="/snippets">代码</a>
        <a href="/resources">资源</a>
    </div>
</nav>

<div class="page-hero">
    <h1>技术学习路径</h1>
    <p>系统化的学习路线，从入门到精通</p>
</div>

<div class="row g-4" style="margin-bottom: 28px;">
    {{ if .paths }}
    {{ range .paths }}
    <div class="col-md-6 col-lg-4">
        <div class="path-card diff-{{ .Difficulty }}" style="height: 100%;">
            <div class="path-title">{{ .Title }}</div>
            <div class="path-desc">{{ .Description }}</div>
            <div class="path-meta">
                <span class="diff-badge diff-{{ .Difficulty }}">{{ if eq .Difficulty 1 }}入门级{{ else if eq .Difficulty 2 }}中级{{ else }}高级{{ end }}</span>
                <span>{{ .Duration }}</span>
                <span>{{ len .Chapters }} 章节</span>
            </div>
            <a href="/learning-paths/{{ .ID }}" class="btn-indigo" style="padding: 8px 22px; font-size: 14px;">开始学习</a>
        </div>
    </div>
    {{ end }}
    {{ else }}
    <div style="text-align: center; padding: 60px; color: var(--c-text-muted); background: var(--c-surface); border: 1px solid var(--c-border); border-radius: var(--radius);">暂无学习路径</div>
    {{ end }}
</div>

<div class="app-footer">
    <p>© 2026 技术学习社区</p>
</div>

</div>
<script src="/static/js/app.js"></script>
</body>
</html>
