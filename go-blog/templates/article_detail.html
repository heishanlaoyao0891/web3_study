<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>{{ .article.Title }} - Go博客</title>
    <style>
        body { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; padding: 20px; border-bottom: 1px solid #eee; }
        .article-title { font-size: 24px; margin: 20px 0; }
        .article-meta { color: #999; margin: 10px 0; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .article-content { margin: 20px 0; line-height: 1.8; }
        a { text-decoration: none; color: #007bff; }
    </style>
</head>
<body>
<div class="header">
    <h1>文章详情</h1>
    <a href="/article/list">返回列表</a>
</div>
<div class="article-title">
    {{ .article.Title }}
</div>
<div class="article-meta">
    作者：{{ .article.User.Nickname }} | 分类：{{ .article.Category.Name }} | 发布时间：{{ .article.CreatedAt.Format "2006-01-02 15:04:05" }}
</div>
<div class="article-content">
    <!-- 输出文章内容（支持换行） -->
    {{ .article.Content | replace "\n" "<br/>" | safeHTML }}
</div>
</body>
</html>
