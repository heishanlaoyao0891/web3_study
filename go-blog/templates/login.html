<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录 - 技术学习社区</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/app.css" rel="stylesheet">
    <script>
        function countdown() {
            const endTimeStr = document.getElementById('end-time').value;
            if (!endTimeStr) return;
            const endTimeUnix = parseInt(endTimeStr);
            if (isNaN(endTimeUnix)) return;
            const endTime = new Date(endTimeUnix * 1000);
            const now = new Date();
            const diff = endTime - now;
            if (diff <= 0) { window.location.reload(); return; }
            const totalSeconds = Math.floor(diff / 1000);
            const days = Math.floor(totalSeconds / (24 * 60 * 60));
            const hours = Math.floor((totalSeconds % (24 * 60 * 60)) / (60 * 60));
            const minutes = Math.floor((totalSeconds % (60 * 60)) / 60);
            const seconds = totalSeconds % 60;
            document.getElementById('countdown').innerHTML = `${days}天 ${hours}小时 ${minutes}分钟 ${seconds}秒`;
            setTimeout(countdown, 1000);
        }
        window.onload = function() { if (document.getElementById('end-time')) countdown(); };
    </script>
</head>
<body class="auth-body">
<div style="position: absolute; top: 20px; left: 20px;">
    <a href="/" style="color: white; font-weight: 600;">← 返回首页</a>
</div>
<div class="auth-card">
    <div class="auth-logo">
        <h1>欢迎回来</h1>
        <p>登录您的技术学习社区账户</p>
    </div>
    {{ if .error }}
        {{ if .is_disabled }}
        <div style="background: #FEE2E2; color: #991B1B; padding: 16px; border-radius: var(--radius-sm); margin-bottom: 20px; text-align: center;">
            {{ .error }}
            {{ if not .is_permanent }}
            <div id="countdown" style="font-size: 18px; font-weight: 700; margin-top: 8px; font-family: var(--font-mono);"></div>
            <input type="hidden" id="end-time" value="{{ .disable_until.Unix }}">
            {{ end }}
        </div>
        {{ else }}
        <div class="auth-error">{{ .error }}</div>
        {{ end }}
    {{ end }}
    <form action="/login" method="post">
        <div class="auth-form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" name="username" placeholder="请输入用户名" required>
        </div>
        <div class="auth-form-group">
            <label for="password">密码</label>
            <input type="password" id="password" name="password" placeholder="请输入密码" required>
        </div>
        <div class="auth-form-group">
            <button type="submit" class="auth-btn">登录</button>
        </div>
    </form>
    <div class="auth-footer">
        <a href="/register">没有账号？立即注册</a>
    </div>
</div>
<script src="/static/js/app.js"></script>
</body>
</html>
