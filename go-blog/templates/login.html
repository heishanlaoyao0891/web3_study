<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录 - Go博客</title>
    <style>
        body { max-width: 400px; margin: 0 auto; padding: 20px; font-family: Arial; }
        .header { text-align: center; padding: 20px; border-bottom: 1px solid #eee; }
        .form-group { margin: 20px 0; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        .btn { padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; width: 100%; }
        .btn:hover { background-color: #0056b3; }
        .error { color: red; margin: 10px 0; }
        .disable-message { background-color: #f8d7da; color: #721c24; padding: 15px; border-radius: 5px; margin: 20px 0; text-align: center; }
        .countdown { font-size: 18px; font-weight: bold; color: #dc3545; margin: 10px 0; }
        a { text-decoration: none; color: #007bff; }
    </style>
    <script>
        function countdown() {
            // 获取禁用结束时间（Unix时间戳）
            const endTimeStr = document.getElementById('end-time').value;
            if (!endTimeStr) return;
            
            // 转换为数字类型
            const endTimeUnix = parseInt(endTimeStr);
            if (isNaN(endTimeUnix)) {
                console.error('无效的结束时间戳:', endTimeStr);
                return;
            }
            
            // 转换为毫秒
            const endTime = new Date(endTimeUnix * 1000);
            const now = new Date();
            
            // 调试信息
            console.log('结束时间:', endTime);
            console.log('当前时间:', now);
            
            const diff = endTime - now;
            console.log('时间差（毫秒）:', diff);
            
            if (diff <= 0) {
                // 时间到，刷新页面
                window.location.reload();
                return;
            }
            
            // 计算剩余时间
            const totalSeconds = Math.floor(diff / 1000);
            const days = Math.floor(totalSeconds / (24 * 60 * 60));
            const hours = Math.floor((totalSeconds % (24 * 60 * 60)) / (60 * 60));
            const minutes = Math.floor((totalSeconds % (60 * 60)) / 60);
            const seconds = totalSeconds % 60;
            
            // 调试信息
            console.log('计算结果:', days, '天', hours, '小时', minutes, '分钟', seconds, '秒');
            
            // 显示倒计时
            const countdownElement = document.getElementById('countdown');
            countdownElement.innerHTML = `剩余时间：${days}天 ${hours}小时 ${minutes}分钟 ${seconds}秒`;
            
            // 每秒更新一次
            setTimeout(countdown, 1000);
        }
        
        // 页面加载完成后开始倒计时
        window.onload = function() {
            if (document.getElementById('end-time')) {
                countdown();
            }
        };
    </script>
</head>
<body>
<div class="header">
    <h1>登录</h1>
</div>
<div class="content">
    {{ if .error }}
        {{ if .is_disabled }}
            <div class="disable-message">
                {{ .error }}
                {{ if not .is_permanent }}
                    <div class="countdown" id="countdown"></div>
                    <input type="hidden" id="end-time" value="{{ .disable_until.Unix }}">
                {{ end }}
            </div>
        {{ else }}
            <div class="error">{{ .error }}</div>
        {{ end }}
    {{ end }}
    <form action="/login" method="post">
        <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" name="username" required>
        </div>
        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" name="password" required>
        </div>
        <div class="form-group">
            <button type="submit" class="btn">登录</button>
        </div>
    </form>
    <div style="text-align: center; margin-top: 20px;">
        <a href="/register">没有账号？立即注册</a>
    </div>
</div>
</body>
</html>
