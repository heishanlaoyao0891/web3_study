<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>个人资料 - Go博客</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { max-width: 1200px; margin: 0 auto; padding: 20px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; min-height: 100vh; }
        .header { text-align: center; padding: 40px 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-radius: 16px; margin-bottom: 30px; }
        .header h1 { font-size: 32px; margin-bottom: 10px; }
        .nav { margin: 20px 0; background: white; padding: 15px 25px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .nav-left, .nav-right { display: flex; align-items: center; }
        .nav a { margin-right: 25px; text-decoration: none; color: #333; font-weight: 500; transition: all 0.3s; }
        .nav a:hover { color: #667eea; }
        .container { max-width: 600px; margin: 0 auto; }
        .profile-card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .profile-title { font-size: 24px; color: #333; margin-bottom: 30px; text-align: center; }
        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; margin-bottom: 8px; color: #555; font-weight: 500; }
        .form-group input { width: 100%; padding: 12px 16px; border: 2px solid #e1e5eb; border-radius: 8px; font-size: 16px; transition: all 0.3s; }
        .form-group input:focus { outline: none; border-color: #667eea; }
        .form-divider { border-top: 2px solid #f0f2f5; margin: 30px 0; padding-top: 20px; }
        .form-divider h3 { color: #333; margin-bottom: 20px; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4); }
        .alert { padding: 12px 16px; border-radius: 8px; margin-bottom: 20px; }
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>
<div class="header">
    <h1>个人资料</h1>
    <p>管理您的账户信息</p>
</div>
<div class="nav">
    <div class="nav-left">
        <a href="/">首页</a>
        <a href="/article/list">文章列表</a>
        <a href="/article/create">发布文章</a>
        {{ if .user }}
            {{ if eq .user.Username "admin" }}
            <a href="/user/list">用户管理</a>
            <a href="/category/list">类别管理</a>
            {{ end }}
        {{ end }}
    </div>
    <div class="nav-right">
        {{ if .user }}
            <span>欢迎，{{ .user.Username }}</span>
            <a href="/profile">个人资料</a>
            <a href="/logout">登出</a>
        {{ else }}
            <a href="/register">注册</a>
            <a href="/login">登录</a>
        {{ end }}
    </div>
</div>
<div class="container">
    <div class="profile-card">
        <h2 class="profile-title">编辑个人资料</h2>
        {{ if .success }}
        <div class="alert alert-success">{{ .success }}</div>
        {{ end }}
        {{ if .error }}
        <div class="alert alert-error">{{ .error }}</div>
        {{ end }}
        <form method="POST" action="/profile">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" value="{{ .user.Username }}" disabled style="background: #f5f7fa;">
            </div>
            <div class="form-group">
                <label>昵称</label>
                <input type="text" name="nickname" value="{{ if .user.Nickname }}{{ .user.Nickname }}{{ else }}{{ .user.Username }}{{ end }}" placeholder="请输入昵称">
            </div>
            <div class="form-divider">
                <h3>修改密码（可选）</h3>
            </div>
            <div class="form-group">
                <label>原密码</label>
                <input type="password" name="old_password" placeholder="如需修改密码请输入原密码">
            </div>
            <div class="form-group">
                <label>新密码</label>
                <input type="password" name="new_password" placeholder="请输入新密码">
            </div>
            <button type="submit" class="btn btn-primary">保存修改</button>
        </form>
    </div>
</div>
</body>
</html>
