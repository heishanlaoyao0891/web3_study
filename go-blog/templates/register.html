<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>注册 - Go博客</title>
    <style>
        body { max-width: 400px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; padding: 20px; border-bottom: 1px solid #eee; }
        .form-group { margin: 20px 0; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        .btn { padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; width: 100%; }
        .btn:hover { background-color: #0056b3; }
        .error { color: red; margin: 10px 0; }
        a { text-decoration: none; color: #007bff; }
    </style>
</head>
<body>
<div class="header">
    <h1>注册</h1>
</div>
<div class="content">
    {{ if .error }}
    <div class="error">{{ .error }}</div>
    {{ end }}
    <form action="/register" method="post">
        <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" name="username" required>
        </div>
        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" name="password" required>
        </div>
        <div class="form-group">
            <label for="nickname">昵称</label>
            <input type="text" id="nickname" name="nickname" required>
        </div>
        <div class="form-group">
            <button type="submit" class="btn">注册</button>
        </div>
    </form>
    <div style="text-align: center; margin-top: 20px;">
        <a href="/login">已有账号？立即登录</a>
    </div>
</div>
</body>
</html>
