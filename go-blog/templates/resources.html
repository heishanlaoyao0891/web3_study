<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>{{ .title }} - Web3技术社区</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { max-width: 1200px; margin: 0 auto; padding: 20px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; }
        .nav { background: white; padding: 18px 30px; border-radius: 16px; margin-bottom: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .nav a { margin-right: 25px; text-decoration: none; color: #333; font-weight: 600; }
        .page-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 40px; border-radius: 20px; margin-bottom: 30px; }
        .page-header h1 { font-size: 32px; margin-bottom: 10px; }
        .filter-bar { background: white; padding: 20px; border-radius: 16px; margin-bottom: 20px; }
        .filter-bar a { padding: 8px 20px; margin-right: 10px; background: #f5f7fa; border-radius: 20px; text-decoration: none; color: #333; }
        .filter-bar a.active { background: #667eea; color: white; }
        .resource-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .resource-card { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); transition: all 0.3s; text-decoration: none; display: block; }
        .resource-card:hover { transform: translateY(-5px); box-shadow: 0 8px 30px rgba(0,0,0,0.12); }
        .resource-icon { font-size: 32px; margin-bottom: 15px; }
        .resource-title { font-size: 18px; font-weight: 600; color: #1a1a2e; margin-bottom: 10px; }
        .resource-desc { color: #666; font-size: 14px; line-height: 1.6; margin-bottom: 15px; }
        .resource-category { display: inline-block; padding: 4px 12px; background: #f5f7fa; border-radius: 15px; font-size: 12px; color: #888; }
        .footer { text-align: center; padding: 40px 0; color: #888; }
    </style>
</head>
<body>
<div class="nav">
    <a href="/">首页</a>
    <a href="/article/list">文章</a>
    <a href="/interview">面试题</a>
    <a href="/qa/list">问答</a>
    <a href="/learning-paths">学习</a>
    <a href="/snippets">代码</a>
    <a href="/resources">资源</a>
</div>
    <a href="/">首页</a>
    <a href="/article/list">技术文章</a>
    <a href="/resources">资源导航</a>
</div>

<div class="page-header">
    <h1>Web3资源导航</h1>
    <p>精选的开发文档、工具和学习资源</p>
</div>

<div class="filter-bar">
    <strong>分类：</strong>
    <a href="/resources" {{ if not .current }}class="active"{{ end }}>全部</a>
    {{ range .categories }}
    <a href="/resources?category={{ . }}" {{ if eq . $.current }}class="active"{{ end }}>{{ . }}</a>
    {{ end }}
</div>

<div class="resource-grid">
    {{ if .resources }}
    {{ range .resources }}
    <a href="{{ .URL }}" target="_blank" class="resource-card">
        <div class="resource-icon">📦</div>
        <div class="resource-title">{{ .Title }}</div>
        <div class="resource-desc">{{ .Description }}</div>
        <span class="resource-category">{{ .Category }}</span>
    </a>
    {{ end }}
    {{ else }}
    <div style="text-align: center; padding: 60px; color: #888; grid-column: 1/-1;">暂无资源</div>
    {{ end }}
</div>

<div class="footer">
    <p>© 2026 Web3技术社区</p>
</div>
</body>
</html>
