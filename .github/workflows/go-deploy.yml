name: Go Gin 自动部署

on:
  push:
    branches: [ main ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 设置 Go 环境
        uses: actions/setup-go@v5
        with:
          go-version: 1.22
          cache: true # 缓存 Go 依赖，加速编译

      - name: 下载依赖
        run: go mod tidy

      - name: 编译项目（Linux 适配）
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o gin-web main.go
          # 验证编译产物是否存在
          if [ ! -f "./gin-web" ]; then
            echo "编译失败：未生成可执行文件"
            exit 1
          fi

      - name: 传输编译产物到服务器
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_PRIVATE_KEY }}
          # 传输 Actions 编译好的可执行文件到服务器指定目录
          source: "gin-web"
          target: "/root/gin-web/test/"

      - name: 服务器端启动服务
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_PRIVATE_KEY }}
          script: |
            # 定义常量
            PROJECT_DIR="/root/gin-web/test"
            BIN_NAME="gin-web"
            LOG_FILE="app.log"

            cd $PROJECT_DIR
            echo "开始部署：设置可执行权限"
            # 赋予可执行权限（传输后可能丢失）
            chmod +x $BIN_NAME

            echo "停止旧服务..."
            # 安全停止旧进程（忽略无进程的情况）
            ps -ef | grep "./$BIN_NAME" | grep -v grep | awk '{print $2}' | xargs kill -9 > /dev/null 2>&1 || true
            sleep 1

            echo "启动新服务..."
            # 后台启动，追加日志（用 >> 避免覆盖历史日志）
            nohup ./$BIN_NAME >> $LOG_FILE 2>&1 &
            sleep 2

            # 验证服务状态
            if ps -ef | grep "./$BIN_NAME" | grep -v grep > /dev/null; then
              echo "✅ 部署完成！服务已启动"
              echo "📄 最新日志："
              tail -n 10 $LOG_FILE
            else
              echo "❌ 部署失败！服务未启动"
              echo "📄 错误日志："
              cat $LOG_FILE
              exit 1
            fi