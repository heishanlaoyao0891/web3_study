name: Go Gin 自动部署

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 服务器端部署
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_PRIVATE_KEY }}
          script: |
            # 定义常量
            PROJECT_DIR="/root/gin-web/test"
            BIN_NAME="gin-web"
            LOG_DIR="/root/gin-web/logs"
            LOG_FILE="$LOG_DIR/app.log"
            REPO_URL="git@github.com:heishanlaoyao0891/web3_study.git"

            echo "开始部署..."
            
            # 创建日志目录
            mkdir -p $LOG_DIR

            echo "清理旧项目文件"
            rm -rf $PROJECT_DIR
            mkdir -p $PROJECT_DIR

            echo "克隆项目代码"
            if ! git clone $REPO_URL $PROJECT_DIR; then
              echo "克隆失败：无法访问GitHub仓库"
              exit 1
            fi
            
            echo "检查目录结构..."
            ls -la $PROJECT_DIR
            
            # 进入go-blog目录
            cd $PROJECT_DIR/go-blog
            
            echo "当前目录：$(pwd)"
            ls -la

            echo "检查 Go 环境..."
            go version

            echo "下载依赖"
            go mod tidy

            echo "编译项目"
            CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o $BIN_NAME .

            # 验证编译产物是否存在
            if [ ! -f "./$BIN_NAME" ]; then
              echo "编译失败：未生成可执行文件"
              exit 1
            fi

            echo "停止旧服务..."
            ps -ef | grep "./$BIN_NAME" | grep -v grep | awk '{print $2}' | xargs kill -9 > /dev/null 2>&1 || true
            sleep 1

            echo "启动新服务..."
            nohup ./$BIN_NAME >> $LOG_FILE 2>&1 &
            
            sleep 2

            # 验证服务状态
            if ps -ef | grep "./$BIN_NAME" | grep -v grep > /dev/null; then
              echo "✅ 部署完成！服务已启动"
              echo "📄 最新日志："
              tail -n 20 $LOG_FILE
              echo ""
              echo "📁 日志目录：$LOG_DIR"
              echo "📄 日志文件：$LOG_FILE"
            else
              echo "❌ 部署失败！服务未启动"
              echo "📄 错误日志："
              cat $LOG_FILE
              exit 1
            fi
